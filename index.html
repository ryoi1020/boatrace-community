<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>艇 — ボートレース予想 SNS</title>
<meta name="theme-color" content="#000000">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#05080f;
  --surface:#0f1620;
  --surface-2:#161e2a;
  --border:#1f2a3a;
  --border-strong:#2c3a4f;
  --text:#e7eef7;
  --text-muted:#7b8696;
  --accent:#1d9bf0;
  --accent-2:#1a8cd8;
  --accent-soft:rgba(29,155,240,.10);
  /* Boatrace palette */
  --water-deep:#062d4b;
  --water:#0d4f7a;
  --water-2:#0f6aa3;
  --water-foam:#7dd3fc;
  --wake:rgba(125,211,252,.18);
  --lane-orange:#ff6a00;
  --lane-orange-soft:rgba(255,106,0,.10);
  --gold:#ffd400;
  --silver:#c0c0c0;
  --bronze:#cd7f32;
  --hit:#00ba7c;
  --hit-soft:rgba(0,186,124,.10);
  --miss:#5a5e63;
  --danger:#f4212e;
  --premium:#ffd400;
  /* Hero background — replace this URL to swap the landing photo */
  --hero-photo: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'/>");
}

html,body{background:var(--bg);color:var(--text)}
html{color-scheme:dark}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  font-size:15px;
  line-height:1.4;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom);
}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{background:none;border:none;cursor:pointer;color:inherit}
.mono{font-variant-numeric:tabular-nums;font-family:"SF Mono",Menlo,Monaco,monospace}

/* ===== Layout ===== */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(0,0,0,.78);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:640px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;gap:12px;
}
.logo{
  font-weight:800;font-size:22px;letter-spacing:-.02em;
  display:flex;align-items:center;gap:8px;
}
.logo-mark{
  width:32px;height:32px;border-radius:10px;
  display:grid;place-items:center;
  background:linear-gradient(135deg,var(--water-2) 0%,var(--water-deep) 100%);
  color:#fff;font-weight:800;font-size:16px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15), 0 4px 12px rgba(13,79,122,.4);
}
.logo-text{font-size:18px}
.topbar-nav{display:none;gap:4px}
.topbar-nav a{
  padding:8px 14px;border-radius:999px;font-weight:500;font-size:14px;
  color:var(--text-muted);transition:background .15s,color .15s;
}
.topbar-nav a:hover{background:var(--surface);color:var(--text)}
.topbar-nav a.active{color:var(--text);background:var(--surface-2)}
.topbar-actions{display:flex;align-items:center;gap:8px}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 16px;border-radius:999px;font-weight:600;font-size:14px;
  background:var(--text);color:#000;
  transition:opacity .15s,transform .1s;
}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-2)}
.btn-outline{background:transparent;border:1px solid var(--border-strong);color:var(--text)}
.btn-outline:hover{background:var(--surface)}
.btn-ghost{background:transparent;color:var(--text-muted);padding:8px 12px}
.btn-ghost:hover{background:var(--surface)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-block{width:100%}
.btn-icon{
  width:36px;height:36px;border-radius:50%;padding:0;
  display:grid;place-items:center;
}
.btn:disabled{opacity:.45;cursor:not-allowed}

.main{
  max-width:640px;margin:0 auto;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  min-height:calc(100vh - 56px);
  padding-bottom:96px;
}
.page-header{
  position:sticky;top:56px;z-index:40;
  background:rgba(0,0,0,.78);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  font-size:18px;font-weight:700;
}
.page-section{padding:16px}
.empty{padding:48px 24px;text-align:center;color:var(--text-muted);font-size:14px}

/* ===== Avatar ===== */
.avatar{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;
  background:linear-gradient(135deg,#3a3a3c 0%,#1d1d1f 100%);
  color:#fff;font-weight:700;font-size:18px;
  overflow:hidden;
  border:1px solid var(--border);
}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-sm{width:32px;height:32px;font-size:14px}
.avatar-lg{width:80px;height:80px;font-size:32px}

/* ===== Card / Post ===== */
.post{
  display:flex;gap:12px;padding:14px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.post:hover{background:rgba(255,255,255,.02)}
.post-body{flex:1;min-width:0}
.post-head{display:flex;align-items:baseline;gap:6px;font-size:14px;flex-wrap:wrap}
.post-name{font-weight:700;color:var(--text)}
.post-name:hover{text-decoration:underline}
.post-handle{color:var(--text-muted)}
.post-time{color:var(--text-muted);font-size:13px}
.bot-badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 6px;border-radius:4px;
  background:var(--accent-soft);color:var(--accent);
  font-size:11px;font-weight:600;
}
.premium-badge{
  display:inline-flex;
  width:14px;height:14px;border-radius:50%;
  background:var(--premium);color:#000;
  font-size:9px;font-weight:900;align-items:center;justify-content:center;
}
.post-meta{
  margin-top:4px;color:var(--text-muted);font-size:13px;
  display:flex;gap:8px;flex-wrap:wrap;
}
.post-picks{
  margin-top:10px;
  display:flex;gap:8px;flex-wrap:wrap;
  font-size:14px;
}
.pick{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border);
  font-weight:600;
}
.pick-mark{font-size:13px;color:var(--text-muted)}
.boat{
  display:inline-grid;place-items:center;
  width:22px;height:22px;border-radius:5px;
  font-size:13px;font-weight:800;color:#fff;
}
.boat-1{background:#fff;color:#000}
.boat-2{background:#1a1a1a;border:1px solid #555}
.boat-3{background:#e63946}
.boat-4{background:#2255cc}
.boat-5{background:#ffd400;color:#000}
.boat-6{background:#22c55e}
.post-comment{margin-top:10px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.post-result{
  margin-top:10px;padding:8px 12px;border-radius:8px;
  font-size:13px;
  background:var(--surface-2);
}
.post-result.hit{background:var(--hit-soft);color:var(--hit)}
.post-result.miss{color:var(--text-muted)}
.hit-label{font-weight:700;margin-right:6px}

/* ===== Forms ===== */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;color:var(--text-muted);font-weight:500}
.field input,.field select,.field textarea{
  width:100%;
  padding:12px 14px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);outline:none;
  transition:border-color .15s,background .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--accent);background:#000;
}
.field textarea{min-height:80px;resize:vertical;font-family:inherit}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.hint{font-size:12px;color:var(--text-muted);margin-top:4px}
.error{color:var(--danger);font-size:13px;min-height:18px;margin-top:4px}
.success{color:var(--hit);font-size:13px;min-height:18px;margin-top:4px}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
  z-index:100;
  display:none;
  align-items:center;justify-content:center;
  padding:16px;
}
.modal-overlay.show{display:flex}
.modal{
  background:#000;border:1px solid var(--border);
  border-radius:16px;width:100%;max-width:440px;
  max-height:calc(100vh - 32px);overflow:auto;
  padding:24px;
  position:relative;
}
.modal-close{
  position:absolute;top:12px;right:12px;
  width:32px;height:32px;border-radius:50%;
  display:grid;place-items:center;color:var(--text-muted);
  font-size:18px;
}
.modal-close:hover{background:var(--surface);color:var(--text)}
.modal h2{font-size:24px;font-weight:800;margin-bottom:4px}
.modal-sub{color:var(--text-muted);margin-bottom:20px;font-size:14px}
.modal-tabs{
  display:flex;background:var(--surface);
  border:1px solid var(--border);border-radius:999px;
  padding:4px;margin-bottom:16px;
}
.modal-tab{
  flex:1;padding:8px 12px;border-radius:999px;
  font-size:13px;font-weight:600;color:var(--text-muted);
}
.modal-tab.active{background:var(--accent);color:#fff}

/* ===== Tabs (in-page) ===== */
.tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  position:sticky;top:104px;z-index:30;
  background:rgba(0,0,0,.78);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
}
.tab{
  flex:1;padding:14px;text-align:center;
  color:var(--text-muted);font-weight:600;font-size:14px;
  position:relative;cursor:pointer;
}
.tab.active{color:var(--text)}
.tab.active::after{
  content:'';position:absolute;left:25%;right:25%;bottom:0;
  height:3px;background:var(--accent);border-radius:2px;
}

/* ===== Landing / Profile / Ranking ===== */
.hero{padding:40px 24px;text-align:center}
.hero h1{
  font-size:34px;font-weight:800;letter-spacing:-.02em;
  margin-bottom:14px;line-height:1.15;
}
.hero p{color:var(--text-muted);margin-bottom:24px;font-size:16px}
.hero-actions{display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto}

.profile-cover{
  height:120px;background:linear-gradient(135deg,#1d2027 0%,#0a0e14 100%);
}
.profile-head{padding:0 16px}
.profile-head-row{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-top:-44px;margin-bottom:12px;
}
.profile-head .avatar-lg{
  border:4px solid #000;background:linear-gradient(135deg,#3a3a3c,#000);
}
.profile-name{font-size:22px;font-weight:800}
.profile-handle{color:var(--text-muted);margin-bottom:10px}
.profile-bio{font-size:14px;line-height:1.5;margin-bottom:10px;white-space:pre-wrap}
.profile-stats{display:flex;gap:18px;font-size:14px;color:var(--text-muted);margin-bottom:12px;flex-wrap:wrap}
.profile-stats strong{color:var(--text);font-weight:700;margin-right:4px}
.stat-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
}
.stat-cell{padding:12px;background:#000;text-align:center}
.stat-num{font-size:18px;font-weight:800;display:block}
.stat-lbl{font-size:11px;color:var(--text-muted);margin-top:2px}

.rank-row{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;
}
.rank-row:hover{background:rgba(255,255,255,.02)}
.rank-no{
  width:32px;text-align:center;font-weight:800;font-size:18px;color:var(--text-muted);
  flex-shrink:0;
}
.rank-1{color:var(--gold)}
.rank-2{color:var(--silver)}
.rank-3{color:var(--bronze)}
.rank-info{flex:1;min-width:0}
.rank-line{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.rank-stat{color:var(--text-muted);font-size:13px;margin-top:2px}
.rank-rate{font-size:18px;font-weight:800}
.rank-rate.high{color:var(--gold)}
.rank-rate.mid{color:var(--accent)}

/* ===== Mobile tabbar ===== */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(0,0,0,.92);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
}
.tabbar a{
  flex:1;padding:10px 4px;text-align:center;color:var(--text-muted);
  font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tabbar a.active{color:var(--text)}
.tabbar a svg{width:24px;height:24px}
.tabbar a.compose svg{
  width:34px;height:34px;color:#fff;background:var(--accent);
  border-radius:50%;padding:6px;
}
.tabbar a.compose{color:var(--text)}

/* ===== Floating compose ===== */
.fab{
  position:fixed;right:20px;bottom:96px;z-index:40;
  width:56px;height:56px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:grid;place-items:center;
  box-shadow:0 8px 24px rgba(29,155,240,.45);
  font-size:24px;
}
.fab:hover{background:var(--accent-2)}

/* ===== AI Page ===== */
.ai-locked{
  margin:24px 16px;padding:24px;border-radius:16px;
  background:linear-gradient(135deg,rgba(255,212,0,.10) 0%,rgba(255,212,0,.02) 100%);
  border:1px solid rgba(255,212,0,.30);
  text-align:center;
}
.ai-locked h3{font-size:20px;font-weight:800;margin-bottom:8px;color:var(--premium)}
.ai-locked p{color:var(--text-muted);font-size:14px;margin-bottom:18px}

/* ===== Result form ===== */
.result-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ===== Loader ===== */
.spinner{
  width:24px;height:24px;border-radius:50%;
  border:3px solid var(--surface);
  border-top-color:var(--accent);
  animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Toast ===== */
.toast{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:120px;z-index:200;
  padding:10px 18px;border-radius:999px;
  background:rgba(255,255,255,.95);color:#000;
  font-size:14px;font-weight:600;
  box-shadow:0 12px 28px rgba(0,0,0,.4);
  opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

/* ===== Boatrace decorations ===== */
body::before{
  content:"";
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(13,79,122,.32) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(125,211,252,.10) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}
.main{position:relative;z-index:1;background:rgba(5,8,15,.85)}

/* Animated waves */
.waves{
  position:absolute;left:0;right:0;bottom:-1px;height:80px;overflow:hidden;
  pointer-events:none;
}
.waves svg{
  position:absolute;left:0;bottom:0;
  width:220%;height:100%;
}
.waves .w1 path{fill:rgba(125,211,252,.10)}
.waves .w2 path{fill:rgba(29,155,240,.18)}
.waves .w3 path{fill:#05080f}
.waves .w1{animation:waveMove 14s linear infinite}
.waves .w2{animation:waveMove 20s linear infinite reverse}
.waves .w3{animation:waveMove 28s linear infinite}
@keyframes waveMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* Lane / course illustration */
.lanes{
  position:relative;height:140px;border-radius:14px;overflow:hidden;
  background:
    linear-gradient(180deg, #0d4f7a 0%, #062d4b 100%);
  box-shadow:inset 0 0 0 1px rgba(125,211,252,.15);
}
.lanes::before{
  content:"";position:absolute;inset:0;
  background:
    repeating-linear-gradient(180deg,
      transparent 0,
      transparent calc(100%/6 - 1px),
      rgba(125,211,252,.20) calc(100%/6 - 1px),
      rgba(125,211,252,.20) calc(100%/6));
}
.lanes::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:50px;
  background:
    radial-gradient(ellipse 80% 100% at 50% 100%, rgba(125,211,252,.18) 0%, transparent 70%);
  filter:blur(3px);
}
.lane-boat{
  position:absolute;left:14px;display:flex;align-items:center;gap:10px;
  color:#e7eef7;font-weight:700;font-size:13px;
  text-shadow:0 1px 2px rgba(0,0,0,.6);
}
.lane-boat svg{filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}

/* Boat SVG sizes */
.boat-icon{width:30px;height:18px;display:inline-block;vertical-align:middle}
.boat-icon-lg{width:64px;height:38px}

/* Hero landing */
.hero-wrap{
  position:relative;overflow:hidden;
  border-bottom:1px solid var(--border);
  background:
    linear-gradient(180deg, rgba(5,8,15,.65) 0%, rgba(5,8,15,.96) 95%),
    var(--hero-photo) center/cover no-repeat,
    linear-gradient(135deg, var(--water-deep) 0%, #021423 100%);
}
.hero{padding:54px 24px 100px;text-align:center;position:relative;z-index:2}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:999px;
  background:rgba(125,211,252,.10);
  border:1px solid rgba(125,211,252,.30);
  color:var(--water-foam);font-size:12px;font-weight:600;letter-spacing:.05em;
  margin-bottom:18px;
}
.hero h1{
  font-size:36px;font-weight:800;letter-spacing:-.02em;
  margin-bottom:14px;line-height:1.15;
}
.hero h1 .accent{
  background:linear-gradient(135deg, #7dd3fc 0%, #1d9bf0 60%, #ff6a00 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero p{color:var(--text-muted);margin-bottom:24px;font-size:16px;line-height:1.6}
.hero-actions{display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto}
.hero-race{
  margin-top:32px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap;
  align-items:center;color:rgba(231,238,247,.7);font-size:12px;
}
.hero-race svg{filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}

/* Profile cover (boatrace water) */
.profile-cover{
  height:140px;position:relative;overflow:hidden;
  background:
    linear-gradient(180deg, #0d4f7a 0%, #062d4b 100%);
}
.profile-cover::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(125,211,252,.25), transparent 60%),
    radial-gradient(circle at 80% 60%, rgba(255,106,0,.10), transparent 50%);
}

/* Decorative section header with wave */
.section-with-wave{
  position:relative;padding:14px 16px;
  font-size:14px;font-weight:700;color:var(--text);
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(13,79,122,.18), transparent);
}
.section-with-wave::before{
  content:"";display:inline-block;width:18px;height:10px;
  background:linear-gradient(90deg, transparent, var(--water-foam), transparent);
  margin-right:8px;border-radius:2px;opacity:.7;vertical-align:middle;
}

/* Pick boat icon (inside post) */
.pick-boat-wrap{display:inline-flex;align-items:center;gap:5px}

/* Bot identity badge override */
.bot-badge.wave{
  background:linear-gradient(90deg, rgba(125,211,252,.20), rgba(29,155,240,.20));
  color:var(--water-foam);
  border:1px solid rgba(125,211,252,.30);
}

/* Premium banner accent */
.premium-strip{
  background:linear-gradient(90deg, rgba(255,212,0,.12), rgba(255,106,0,.10));
  border:1px solid rgba(255,212,0,.25);
  padding:10px 14px;border-radius:10px;
  font-size:13px;color:#ffe066;
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
}

/* Splash on action */
@keyframes splash{
  0%{box-shadow:0 0 0 0 rgba(125,211,252,.45)}
  100%{box-shadow:0 0 0 22px rgba(125,211,252,0)}
}
.fab{animation:splash 2.6s ease-out infinite}

/* ===== Responsive ===== */
@media (min-width:768px){
  .topbar-nav{display:flex}
  .tabbar{display:none}
  .fab{display:none}
  .main{padding-bottom:32px}
  .tabs{top:65px}
}
@media (max-width:480px){
  .hero h1{font-size:28px}

<!-- ===== Auth Modal ===== -->
<div class="modal-overlay" id="auth-modal" onclick="if(event.target.id==='auth-modal')closeAuth()">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">×</button>
    <h2>アカウント</h2>
    <p class="modal-sub">予想を投稿してコミュニティに参加しよう</p>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="login" onclick="switchAuthTab('login')">ログイン</button>
      <button class="modal-tab" data-tab="register" onclick="switchAuthTab('register')">新規登録</button>

    <form id="form-login" onsubmit="return doLogin(event)">
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="login-email" autocomplete="email" required>
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">ログイン</button>
    </form>

    <form id="form-register" style="display:none" onsubmit="return doRegister(event)">
      <div class="field">
        <label>表示名</label>
        <input type="text" id="reg-display" placeholder="例: ボートマスター" required maxlength="50">
      </div>
      <div class="field">
        <label>ユーザー名 (半角英数_)</label>
        <input type="text" id="reg-username" pattern="[a-zA-Z0-9_]{3,20}" required>
        <div class="hint">3〜20文字 / 半角英数とアンダースコア</div>
      </div>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="reg-email" required>

      <div class="field">

    <div id="auth-error" class="error"></div>

    <div style="margin-top:18px;padding-top:18px;border-top:1px solid var(--border);text-align:center">
      <button class="btn btn-outline btn-block" id="google-btn" onclick="startGoogleAuth()" style="display:none">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.83.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.32A8.99 8.99 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l3.01-2.32z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A8.99 8.99 0 0 0 9 0 9 9 0 0 0 .96 4.96l3.01 2.32C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Googleでログイン
      </button>
    </div>
  </div>
</div>

<script>
const SERVER = location.origin.startsWith('http://localhost') || location.origin.startsWith('http://127.')
  ? location.origin
  : 'https://boatrace-community.onrender.com';

const VENUES = [
  ["01","桐生"],["02","戸田"],["03","江戸川"],["04","平和島"],
  ["05","多摩川"],["06","浜名湖"],["07","蒲郡"],["08","常滑"],
  ["09","津"],["10","三国"],["11","びわこ"],["12","住之江"],
  ["13","尼崎"],["14","鳴門"],["15","丸亀"],["16","児島"],
  ["17","宮島"],["18","徳山"],["19","下関"],["20","若松"],
  ["21","芦屋"],["22","福岡"],["23","唐津"],["24","大村"],
];

const HIT_LABELS = {
  sanren_tan:  { label: "3連単的中", color: "var(--gold)" },
  sanren_fuku: { label: "3連複的中", color: "var(--hit)" },
  niren_tan:   { label: "2連単的中", color: "var(--accent)" },
  niren_fuku:  { label: "2連複的中", color: "var(--accent)" },
  tan:         { label: "単勝的中",  color: "var(--hit)" },
  none:        { label: "不的中",    color: "var(--miss)" },
};

const AUTH_TOKEN_KEY = "boatrace_auth_token";
const AUTH_API_PATHS = [
  "/me","/auth/logout","/predictions",
  "/scrape","/predict",
  "/bulk_predict","/bulk_cancel","/venue_predict","/venue_cancel",
  "/result",
];
let currentUser = null;
let googleConfigured = false;

const getToken = () => localStorage.getItem(AUTH_TOKEN_KEY) || "";
const setToken = t => t ? localStorage.setItem(AUTH_TOKEN_KEY, t) : localStorage.removeItem(AUTH_TOKEN_KEY);

(function patchFetch(){
  const orig = window.fetch.bind(window);
  window.fetch = function(input, init){
    init = init || {};
    const url = typeof input === "string" ? input : (input && input.url) || "";
    if (url.startsWith(SERVER)) {
      const path = url.slice(SERVER.length).split("?")[0];
      const needAuth = AUTH_API_PATHS.indexOf(path) !== -1
        || path.startsWith("/follow/")
        || (path.startsWith("/predictions/") && path.endsWith("/result"));
      if (needAuth) {
        const tok = getToken();
        if (tok) {
          const headers = new Headers(init.headers || {});
          headers.set("Authorization","Bearer " + tok);
          init.headers = headers;
        }
      }
    }
    return orig(input, init);
  };
})();

async function api(path, init){
  const res = await fetch(SERVER + path, init || {});
  let data = null;
  try { data = await res.json(); } catch(e){ data = {}; }
  if (!res.ok) {
    const err = new Error(data && data.error ? data.error : `${res.status}`);
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove("show"), 2200);
}

function escapeHtml(s){
  return String(s == null ? "" : s).replace(/[<>&"']/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;","\"":"&quot;","'":"&#39;"}[c]));
}

function formatTime(iso){
  if (!iso) return "";
  const d = new Date(iso.replace(" ","T"));
  if (isNaN(d)) return "";
  const now = Date.now();
  const diff = (now - d.getTime()) / 1000;
  if (diff < 60) return "いま";
  if (diff < 3600) return Math.floor(diff/60) + "分";
  if (diff < 86400) return Math.floor(diff/3600) + "時間";
  if (diff < 86400*7) return Math.floor(diff/86400) + "日";
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function initials(name){
  return (name || "?").trim().charAt(0).toUpperCase();
}

function avatarHtml(user, size){
  const cls = size === "lg" ? "avatar avatar-lg" : size === "sm" ? "avatar avatar-sm" : "avatar";
  if (user && user.avatar_url) {
    return `<div class="${cls}"><img src="${escapeHtml(user.avatar_url)}" alt=""></div>`;
  }
  if (user && user.is_bot) {
    return `<div class="${cls}" style="background:linear-gradient(135deg,#062d4b,#1d9bf0);">
      <svg viewBox="0 0 40 40" width="60%" height="60%" fill="none">
        <path d="M5 28 Q12 23 20 28 T35 28" stroke="#7dd3fc" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M5 22 Q12 17 20 22 T35 22" stroke="#fff" stroke-width="2.4" stroke-linecap="round" opacity=".7"/>
        <circle cx="20" cy="14" r="3" fill="#fff"/>
      </svg>
    </div>`;
  }
  return `<div class="${cls}">${escapeHtml(initials(user && (user.display_name || user.username)))}</div>`;
}

function boatSvg(num, big){
  const lane = num % 6 === 0 ? 6 : num;
  const colors = {
    1: ["#ffffff", "#cbd5e1"], 2: ["#1a1a1a", "#444"],
    3: ["#e63946", "#a31525"], 4: ["#2255cc", "#0a3a92"],
    5: ["#ffd400", "#b88a00"], 6: ["#22c55e", "#0f8a3b"],
  }[lane] || ["#7b8696", "#5a5e63"];
  const cls = big ? "boat-icon boat-icon-lg" : "boat-icon";
  return `<svg class="${cls}" viewBox="0 0 60 36" aria-hidden="true">
    <defs>
      <linearGradient id="b${lane}-${big?'l':'s'}" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0" stop-color="${colors[0]}"/>
        <stop offset="1" stop-color="${colors[1]}"/>
      </linearGradient>
    </defs>
    <path d="M2 22 Q4 14 14 14 H42 Q54 14 58 22 Q44 30 30 30 Q14 30 2 22 Z" fill="url(#b${lane}-${big?'l':'s'})" stroke="rgba(0,0,0,.5)" stroke-width=".5"/>
    <path d="M22 14 V8 H40 V14" fill="${colors[1]}" stroke="rgba(0,0,0,.4)" stroke-width=".5"/>
    <text x="31" y="13" text-anchor="middle" font-size="7" font-weight="800" fill="${lane===1||lane===5?'#000':'#fff'}">${lane}</text>
  </svg>`;
}

function wavesSvg(){
  return `<div class="waves" aria-hidden="true">
    <svg class="w1" viewBox="0 0 2880 100" preserveAspectRatio="none"><path d="M0,60 C240,90 480,30 720,60 C960,90 1200,30 1440,60 L1440,100 L0,100 Z M1440,60 C1680,90 1920,30 2160,60 C2400,90 2640,30 2880,60 L2880,100 L1440,100 Z"/></svg>
    <svg class="w2" viewBox="0 0 2880 100" preserveAspectRatio="none"><path d="M0,70 C240,40 480,90 720,55 C960,90 1200,40 1440,70 L1440,100 L0,100 Z M1440,70 C1680,40 1920,90 2160,55 C2400,90 2640,40 2880,70 L2880,100 L1440,100 Z"/></svg>
    <svg class="w3" viewBox="0 0 2880 100" preserveAspectRatio="none"><path d="M0,80 C240,60 480,98 720,70 C960,98 1200,60 1440,80 L1440,100 L0,100 Z M1440,80 C1680,60 1920,98 2160,70 C2400,98 2640,60 2880,80 L2880,100 L1440,100 Z"/></svg>
  </div>`;
}

function userHandle(user){
  return user ? `@${escapeHtml(user.username)}` : "";
}

function picksHtml(p){
  return `
    <div class="post-picks">
      <span class="pick"><span class="pick-mark">◎</span><span class="boat boat-${p.honmei_num}">${p.honmei_num}</span></span>
      <span class="pick"><span class="pick-mark">○</span><span class="boat boat-${p.niban_num}">${p.niban_num}</span></span>
      <span class="pick"><span class="pick-mark">▲</span><span class="boat boat-${p.sanban_num}">${p.sanban_num}</span></span>
    </div>`;
}

function resultHtml(p){
  if (p.result_first == null) return "";
  const hit = p.hit_kind || "none";
  const lbl = HIT_LABELS[hit] || HIT_LABELS.none;
  const cls = p.is_hit ? "post-result hit" : "post-result miss";
  return `<div class="${cls}">
    <span class="hit-label">${lbl.label}</span>
    <span class="mono">${p.result_first}-${p.result_second}-${p.result_third}</span>
  </div>`;
}

function postHtml(p){
  const u = p.user || {};
  const isBot = u.is_bot;
  const canRegister = currentUser && (currentUser.id === u.id || currentUser.is_premium);
  const needsResult = p.result_first == null;
  const registerBtn = (canRegister && needsResult)
    ? `<button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="event.stopPropagation();openResult(${p.id},'${escapeHtml(p.venue)}','${p.race_num}')">結果を登録</button>`
    : "";
  return `<article class="post" onclick="nav('/profile/${encodeURIComponent(u.username)}')">
    ${avatarHtml(u)}
    <div class="post-body">
      <div class="post-head">
        <a class="post-name" href="#/profile/${encodeURIComponent(u.username)}" onclick="event.stopPropagation()">${escapeHtml(u.display_name || u.username)}</a>
        ${u.is_premium && !isBot ? '<span class="premium-badge" title="プレミアム">★</span>' : ''}
        ${isBot ? '<span class="bot-badge wave">🌊 ORACLE</span>' : ''}
        <span class="post-handle">${userHandle(u)}</span>
        <span class="post-handle">·</span>
        <span class="post-time">${formatTime(p.posted_at)}</span>
      </div>
      <div class="post-meta">
        <span>${escapeHtml(p.venue)} ${escapeHtml(p.race_num)}</span>
        <span class="mono">${escapeHtml(p.race_date)}</span>
      </div>
      ${picksHtml(p)}
      ${p.comment ? `<div class="post-comment">${escapeHtml(p.comment)}</div>` : ""}
      ${resultHtml(p)}
      ${registerBtn}
    </div>
  </article>`;
}

// ===== Auth UI =====
function renderTopbar(){
  const el = document.getElementById("topbar-actions");
  if (!el) return;
  if (currentUser) {
    el.innerHTML = `
      <a href="#/profile/${encodeURIComponent(currentUser.username)}" class="avatar avatar-sm" title="${escapeHtml(currentUser.display_name || currentUser.username)}">
        ${currentUser.avatar_url
          ? `<img src="${escapeHtml(currentUser.avatar_url)}" alt="">`
          : escapeHtml(initials(currentUser.display_name || currentUser.username))}
      </a>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">ログアウト</button>
    `;
  } else {
    el.innerHTML = `
      <button class="btn btn-outline btn-sm" onclick="openAuth('login')">ログイン</button>
      <button class="btn btn-primary btn-sm" onclick="openAuth('register')">登録</button>
    `;
  }
  const fab = document.getElementById("fab");
  if (fab) fab.style.display = currentUser ? "grid" : "none";
  const tbc = document.getElementById("tabbar-compose");
  if (tbc) tbc.style.display = currentUser ? "flex" : "none";
}

function openAuth(tab){
  document.getElementById("auth-modal").classList.add("show");
  switchAuthTab(tab || "login");
  document.getElementById("auth-error").textContent = "";
}
function closeAuth(){
  document.getElementById("auth-modal").classList.remove("show");
}
function switchAuthTab(tab){
  document.querySelectorAll(".modal-tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("form-login").style.display = tab === "login" ? "block" : "none";
  document.getElementById("form-register").style.display = tab === "register" ? "block" : "none";
  document.getElementById("auth-error").textContent = "";
}

async function doLogin(ev){
  ev.preventDefault();
  const errEl = document.getElementById("auth-error");
  errEl.textContent = "";
  try {
    const data = await api("/auth/login", {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({
        email: document.getElementById("login-email").value.trim(),
        password: document.getElementById("login-password").value,
      }),
    });
    setToken(data.token);
    currentUser = data.user;
    renderTopbar();
    closeAuth();
    router();
    toast("ログインしました");
  } catch(e){
    errEl.textContent = e.message;
  }
  return false;
}

async function doRegister(ev){
  ev.preventDefault();
  const errEl = document.getElementById("auth-error");
  errEl.textContent = "";
  try {
    const data = await api("/auth/register", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        email: document.getElementById("reg-email").value.trim(),
        password: document.getElementById("reg-password").value,
        username: document.getElementById("reg-username").value.trim(),
        display_name: document.getElementById("reg-display").value.trim(),
      }),
    });
    setToken(data.token);
    currentUser = data.user;
    renderTopbar();
    closeAuth();
    router();
    toast("ようこそ！");
  } catch(e){
    errEl.textContent = e.message;
  }
  return false;
}

async function doLogout(){
  try { await api("/auth/logout", { method: "POST" }); } catch(e){}
  setToken("");
  currentUser = null;
  renderTopbar();
  router();
  toast("ログアウトしました");
}

function startGoogleAuth(){
  location.href = SERVER + "/auth/google";
}

async function refreshMe(){
  if (!getToken()) { currentUser = null; return; }
  try {
    const data = await api("/me");
    currentUser = data.user;
  } catch(e){
    currentUser = null;
    setToken("");
  }
}

async function refreshHealth(){
  try {
    const h = await api("/health");
    googleConfigured = !!h.google_oauth_configured;
    const btn = document.getElementById("google-btn");
    if (btn) btn.style.display = googleConfigured ? "inline-flex" : "none";
  } catch(e){}
}

function requireLoginUI(){

// ===== Router =====
function nav(path){ location.hash = "#" + path; }

function parseHash(){
  let h = location.hash || "#/";
  if (h.charAt(0) === "#") h = h.slice(1);
  if (!h) h = "/";
  return h;
}

async function router(){
  const path = parseHash();
  // sync active states
  document.querySelectorAll("[data-route]").forEach(el => {
    const r = el.dataset.route;
    el.classList.toggle("active", path === r || (r !== "/" && path.startsWith(r)));
  });

  const app = document.getElementById("app");
  app.scrollTop = 0;
  window.scrollTo(0,0);

  if (path === "/" || path === "/timeline") {
    return renderHome(app);
  }
  if (path === "/ranking") {
    return renderRanking(app);
  }
  if (path === "/ai") {
    return renderAI(app);
  }
  if (path === "/upgrade") {
    return renderUpgrade(app);
  }
  if (path === "/compose") {
    if (!requireLoginUI()) { nav("/"); return; }
    openCompose();
    nav("/timeline");
    return;
  }
  if (path.startsWith("/profile/")) {
    let username = decodeURIComponent(path.slice("/profile/".length));
    if (username === "me") {
      if (!currentUser) { openAuth("login"); nav("/"); return; }
      username = currentUser.username;
      nav("/profile/" + encodeURIComponent(username));
      return;
    }
    return renderProfile(app, username);
  }
  app.innerHTML = `<div class="empty">ページが見つかりません</div>`;
}

window.addEventListener("hashchange", router);

      btn.textContent = "フォローする";
      btn.classList.remove("btn-outline");
      btn.classList.add("btn-primary");

      btn.textContent = "フォロー中";

          <button class="btn btn-primary btn-block" disabled>月額プラン (準備中)</button>
          <button class="btn btn-outline btn-block" onclick="nav('/')">戻る</button>
        </div>
      </div>
      ${wavesSvg()}
    </div>
  `;
}

(async function init(){

  await refreshMe();

</script>
